apiVersion: v1
kind: Namespace
metadata:
  name: webui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
        - name: webui
          image: mizumi-webui:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: production
            - name: KEYCLOAK_REALM
              value: sovico
            - name: KEYCLOAK_CLIENT_ID
              value: webui
            - name: KEYCLOAK_CLIENT_SECRET
              value: webui-secret
            - name: KEYCLOAK_PUBLIC_BASE_URL
              value: http://127.0.0.1:8083
            - name: KEYCLOAK_INTERNAL_BASE_URL
              value: http://keycloak-svc.keycloak.svc.cluster.local:8080
            - name: BETTER_AUTH_SECRET
              value: xohzlCDjF8FoDU+SFb1Dcw9BCkYFGs7NaipxrZE6rwk=
            - name: API_BASE_URL
              value: http://controlplane-svc.controlplane.svc.cluster.local:4000
            - name: SYNTHETIC_BASE_URL
              value: http://synthetic-server-svc.synthetic.svc.cluster.local:8092
            - name: UC_BASE_URL
              value: http://unitycatalog-svc.unitycatalog.svc.cluster.local:8080/api/2.1/unity-catalog
            - name: RUSTFS_S3_URL
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: RUSTFS_ACCESS_KEY_ID
              value: rustfsadmin
            - name: RUSTFS_SECRET_ACCESS_KEY
              value: rustfsadmin
            - name: LANCEDB_BASE_URL
              value: http://lancedb-svc.lancedb.svc.cluster.local:8080
            - name: EMBEDDING_MODEL
              value: text-embedding-3-small
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: webui-secret
                  key: OPENAI_BASE_URL
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: webui-secret
                  key: OPENAI_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: webui-svc
  namespace: webui
spec:
  selector:
    app: webui
  ports:
    - port: 3000
      targetPort: 3000
