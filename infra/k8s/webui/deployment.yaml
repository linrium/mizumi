apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
        - name: webui
          image: mizumi-webui:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: production
            - name: KEYCLOAK_REALMS
              value: sovico
            - name: KEYCLOAK_CLIENT_ID
              value: webui
            - name: KEYCLOAK_CLIENT_SECRET
              value: webui-secret
            - name: KEYCLOAK_PUBLIC_BASE_URL
              value: http://127.0.0.1:8083
            - name: KEYCLOAK_INTERNAL_BASE_URL
              value: http://keycloak-svc.keycloak.svc.cluster.local:8080
            - name: AUTH_SECRET
              value: mizumi-webui-dev-auth-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: webui-svc
  namespace: webui
spec:
  selector:
    app: webui
  ports:
    - port: 3000
      targetPort: 3000
