apiVersion: batch/v1
kind: Job
metadata:
  name: unitycatalog-banking-bootstrap
  namespace: unitycatalog
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: create-buckets
          image: minio/mc:latest
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc mb --ignore-existing rustfs/bronze
              mc mb --ignore-existing rustfs/silver
              mc mb --ignore-existing rustfs/gold
              echo "buckets ready"

      containers:
        - name: bootstrap
          image: python:3.11-alpine
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - sh
            - -c
            - |
              cat > /tmp/banking_bootstrap.py << 'PYEOF'
              import json, time, sys, urllib.request, urllib.error

              UC = "http://unitycatalog-svc:8080/api/2.1/unity-catalog"
              CATALOG = "banking"

              def post(path, data):
                  req = urllib.request.Request(
                      f"{UC}/{path}",
                      data=json.dumps(data).encode(),
                      headers={"Content-Type": "application/json"},
                      method="POST",
                  )
                  try:
                      with urllib.request.urlopen(req) as r:
                          print("  ok:", json.loads(r.read()).get("name", ""))
                  except urllib.error.HTTPError as e:
                      msg = e.read().decode()
                      if e.code == 409:
                          print("  already exists")
                      else:
                          print(f"  ERROR {e.code}: {msg[:300]}", file=sys.stderr)

              def col(name, type_name, type_text, json_type, pos):
                  return {
                      "name": name,
                      "type_name": type_name,
                      "type_text": type_text,
                      "type_json": f'{{"name":"{name}","type":"{json_type}","nullable":true,"metadata":{{}}}}',
                      "position": pos,
                      "nullable": True,
                  }

              # ── Column definitions ────────────────────────────────────────────────

              SILVER_TX_COLS = [
                  col("transaction_id",    "LONG",      "bigint",    "long",      0),
                  col("account_id",        "LONG",      "bigint",    "long",      1),
                  col("customer_id",       "LONG",      "bigint",    "long",      2),
                  col("amount",            "DOUBLE",    "double",    "double",    3),
                  col("currency",          "STRING",    "string",    "string",    4),
                  col("merchant_category", "STRING",    "string",    "string",    5),
                  col("country_code",      "STRING",    "string",    "string",    6),
                  col("timestamp",         "TIMESTAMP", "timestamp", "timestamp", 7),
                  col("transaction_type",  "STRING",    "string",    "string",    8),
                  col("status",            "STRING",    "string",    "string",    9),
                  col("channel",           "STRING",    "string",    "string",    10),
                  col("transaction_date",  "DATE",      "date",      "date",      11),
                  col("processed_at",      "TIMESTAMP", "timestamp", "timestamp", 12),
              ]

              DAILY_SUMMARY_COLS = [
                  col("transaction_date",       "DATE",   "date",   "date",    0),
                  col("country_code",           "STRING", "string", "string",  1),
                  col("channel",                "STRING", "string", "string",  2),
                  col("transaction_count",      "LONG",   "bigint", "long",    3),
                  col("active_accounts",        "LONG",   "bigint", "long",    4),
                  col("total_volume",           "DOUBLE", "double", "double",  5),
                  col("avg_transaction_amount", "DOUBLE", "double", "double",  6),
                  col("active_customers",       "LONG",   "bigint", "long",    7),
              ]

              ACCOUNT_BALANCE_COLS = [
                  col("account_id",             "LONG",   "bigint", "long",    0),
                  col("transaction_date",       "DATE",   "date",   "date",    1),
                  col("daily_net_flow",         "DOUBLE", "double", "double",  2),
                  col("transaction_count",      "LONG",   "bigint", "long",    3),
                  col("total_volume",           "DOUBLE", "double", "double",  4),
                  col("cumulative_balance",     "DOUBLE", "double", "double",  5),
                  col("rolling_30d_avg_volume", "DOUBLE", "double", "double",  6),
              ]

              STREAMING_TX_COLS = [
                  col("transaction_id",    "LONG",      "bigint",    "long",      0),
                  col("account_id",        "LONG",      "bigint",    "long",      1),
                  col("customer_id",       "LONG",      "bigint",    "long",      2),
                  col("amount",            "DOUBLE",    "double",    "double",    3),
                  col("currency",          "STRING",    "string",    "string",    4),
                  col("merchant_category", "STRING",    "string",    "string",    5),
                  col("country_code",      "STRING",    "string",    "string",    6),
                  col("timestamp",         "TIMESTAMP", "timestamp", "timestamp", 7),
                  col("transaction_type",  "STRING",    "string",    "string",    8),
                  col("status",            "STRING",    "string",    "string",    9),
                  col("channel",           "STRING",    "string",    "string",    10),
              ]

              AML_STRUCTURING_COLS = [
                  col("customer_id",       "LONG",      "bigint",    "long",      0),
                  col("account_id",        "LONG",      "bigint",    "long",      1),
                  col("transaction_date",  "DATE",      "date",      "date",      2),
                  col("tx_count",          "LONG",      "bigint",    "long",      3),
                  col("total_amount",      "DOUBLE",    "double",    "double",    4),
                  col("avg_amount",        "DOUBLE",    "double",    "double",    5),
                  col("first_tx_time",     "TIMESTAMP", "timestamp", "timestamp", 6),
                  col("last_tx_time",      "TIMESTAMP", "timestamp", "timestamp", 7),
                  col("hours_span",        "DOUBLE",    "double",    "double",    8),
                  col("alert_type",        "STRING",    "string",    "string",    9),
                  col("detected_at",       "TIMESTAMP", "timestamp", "timestamp", 10),
              ]

              AML_RAPID_COLS = [
                  col("account_id",          "LONG",      "bigint",    "long",      0),
                  col("customer_id",         "LONG",      "bigint",    "long",      1),
                  col("alert_date",          "DATE",      "date",      "date",      2),
                  col("max_tx_in_10min",     "LONG",      "bigint",    "long",      3),
                  col("max_amount_in_10min", "DOUBLE",    "double",    "double",    4),
                  col("alert_type",          "STRING",    "string",    "string",    5),
                  col("detected_at",         "TIMESTAMP", "timestamp", "timestamp", 6),
              ]

              RISK_SCORE_COLS = [
                  col("customer_id",   "LONG",   "bigint", "long",    0),
                  col("tx_count",      "LONG",   "bigint", "long",    1),
                  col("total_volume",  "DOUBLE", "double", "double",  2),
                  col("avg_amount",    "DOUBLE", "double", "double",  3),
                  col("country_count", "LONG",   "bigint", "long",    4),
                  col("account_count", "LONG",   "bigint", "long",    5),
                  col("risk_tier",     "STRING", "string", "string",  6),
              ]

              FRAUD_PATTERN_COLS = [
                  col("customer_id",          "LONG",   "bigint", "long",    0),
                  col("transaction_date",     "DATE",   "date",   "date",    1),
                  col("pattern_type",         "STRING", "string", "string",  2),
                  col("near_threshold_count", "LONG",   "bigint", "long",    3),
                  col("near_threshold_total", "DOUBLE", "double", "double",  4),
                  col("accounts_used",        "LONG",   "bigint", "long",    5),
              ]

              CUSTOMER_PROFILE_COLS = [
                  col("customer_id",               "LONG",   "bigint", "long",    0),
                  col("account_count",             "LONG",   "bigint", "long",    1),
                  col("total_transactions",        "LONG",   "bigint", "long",    2),
                  col("total_volume",              "DOUBLE", "double", "double",  3),
                  col("avg_transaction_amount",    "DOUBLE", "double", "double",  4),
                  col("countries_active",          "LONG",   "bigint", "long",    5),
                  col("merchant_categories_used",  "LONG",   "bigint", "long",    6),
                  col("days_since_last_tx",        "INT",    "int",    "integer", 7),
                  col("customer_tenure_days",      "INT",    "int",    "integer", 8),
                  col("preferred_channel",         "STRING", "string", "string",  9),
                  col("risk_tier",                 "STRING", "string", "string",  10),
              ]

              CUSTOMER_CHANNEL_COLS = [
                  col("customer_id",       "LONG",   "bigint", "long",    0),
                  col("channel",           "STRING", "string", "string",  1),
                  col("transaction_count", "LONG",   "bigint", "long",    2),
                  col("total_volume",      "DOUBLE", "double", "double",  3),
                  col("avg_amount",        "DOUBLE", "double", "double",  4),
                  col("first_use_date",    "DATE",   "date",   "date",    5),
                  col("last_use_date",     "DATE",   "date",   "date",    6),
              ]

              MONTHLY_REVENUE_COLS = [
                  col("month_start",       "DATE",   "date",   "date",    0),
                  col("merchant_category", "STRING", "string", "string",  1),
                  col("country_code",      "STRING", "string", "string",  2),
                  col("transaction_count", "LONG",   "bigint", "long",    3),
                  col("unique_customers",  "LONG",   "bigint", "long",    4),
                  col("total_volume",      "DOUBLE", "double", "double",  5),
                  col("avg_amount",        "DOUBLE", "double", "double",  6),
              ]

              # ── Table registry per schema ─────────────────────────────────────────

              SCHEMAS = {
                  "transactions": {
                      "comment": "Cleaned and aggregated transaction data",
                      "tables": [
                          {
                              "name": "silver_transactions",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/silver_transactions",
                              "columns": SILVER_TX_COLS,
                              "comment": "Cleaned, deduplicated transactions — Banking Transactions SDP (Delta)",
                          },
                          {
                              "name": "gold_daily_transaction_summary",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_daily_transaction_summary",
                              "columns": DAILY_SUMMARY_COLS,
                              "comment": "Daily transaction volume by country + channel — Transactions SDP (Delta)",
                          },
                          {
                              "name": "gold_account_balance_trends",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/account_balance_trends",
                              "columns": ACCOUNT_BALANCE_COLS,
                              "comment": "Daily net flow, cumulative balance, 30-day rolling avg per account (Delta)",
                          },
                          {
                              "name": "streaming_transactions",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://silver/banking/streaming",
                              "columns": STREAMING_TX_COLS,
                              "comment": "Real-time transaction events from Kafka banking-transactions topic (Delta)",
                          },
                      ],
                  },
                  "risk": {
                      "comment": "Fraud signals, AML patterns, and customer risk scores",
                      "tables": [
                          {
                              "name": "gold_aml_structuring_alerts",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_aml_structuring_alerts",
                              "columns": AML_STRUCTURING_COLS,
                              "comment": "AML structuring alerts — transactions just below $10k threshold (Delta)",
                          },
                          {
                              "name": "gold_aml_rapid_sequences",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_aml_rapid_sequences",
                              "columns": AML_RAPID_COLS,
                              "comment": "AML rapid sequence alerts — >= 5 transactions in 10 minutes (Delta)",
                          },
                          {
                              "name": "gold_customer_risk_scores",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/customer_risk_scores",
                              "columns": RISK_SCORE_COLS,
                              "comment": "Customer risk tiers computed by Daft — LOW/MEDIUM/HIGH/CRITICAL (Delta)",
                          },
                          {
                              "name": "gold_fraud_pattern_analysis",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/fraud_pattern_analysis",
                              "columns": FRAUD_PATTERN_COLS,
                              "comment": "Fraud patterns (structuring + cross-border anomaly) — Daft on Ray (Delta)",
                          },
                      ],
                  },
                  "customers": {
                      "comment": "Customer profiles and channel behavior",
                      "tables": [
                          {
                              "name": "gold_customer_banking_profile",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_customer_banking_profile",
                              "columns": CUSTOMER_PROFILE_COLS,
                              "comment": "Customer profile with account diversity, tenure, and risk tier (Delta)",
                          },
                          {
                              "name": "gold_customer_channel_usage",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_customer_channel_usage",
                              "columns": CUSTOMER_CHANNEL_COLS,
                              "comment": "Per-customer channel (POS/ATM/ONLINE/MOBILE) usage breakdown (Delta)",
                          },
                      ],
                  },
                  "finance": {
                      "comment": "Revenue and P&L aggregations",
                      "tables": [
                          {
                              "name": "gold_monthly_revenue_by_category",
                              "data_source_format": "DELTA",
                              "storage_location": "s3://gold/banking/sdp-warehouse/gold_monthly_revenue_by_category",
                              "columns": MONTHLY_REVENUE_COLS,
                              "comment": "Monthly transaction volume by merchant category and country (Delta)",
                          },
                      ],
                  },
              }

              # ── Bootstrap ─────────────────────────────────────────────────────────

              print("Waiting for UC server...")
              for _ in range(60):
                  try:
                      urllib.request.urlopen(f"{UC}/catalogs")
                      print("UC server ready")
                      break
                  except:
                      time.sleep(5)
              else:
                  sys.exit("UC did not start in time")

              print(f"\nCreating catalog: {CATALOG}")
              post("catalogs", {"name": CATALOG, "comment": "Banking lakehouse — medallion architecture demo"})

              for schema_name, schema in SCHEMAS.items():
                  print(f"\nCreating schema: {CATALOG}.{schema_name}")
                  post("schemas", {"name": schema_name, "catalog_name": CATALOG, "comment": schema["comment"]})

                  for t in schema["tables"]:
                      print(f"  Registering table: {t['name']}")
                      post("tables", {
                          "catalog_name": CATALOG,
                          "schema_name": schema_name,
                          "table_type": "EXTERNAL",
                          **t,
                      })

              print("\nBootstrap complete.")
              for schema_name in SCHEMAS:
                  with urllib.request.urlopen(
                      f"{UC}/tables?catalog_name={CATALOG}&schema_name={schema_name}"
                  ) as r:
                      data = json.loads(r.read())
                      names = [t.get("name") for t in data.get("tables", [])]
                      print(f"  {CATALOG}.{schema_name}: {names}")
              PYEOF
              python3 /tmp/banking_bootstrap.py
