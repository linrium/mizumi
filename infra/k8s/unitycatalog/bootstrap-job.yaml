                  for schema_name, schema in catalog["schemas"].items():
                      print(f"\nCreating schema: {catalog_name}.{schema_name}")
                      post("schemas", {
                          "name": schema_name,
                          "catalog_name": catalog_name,
                          "comment": schema["comment"],
                      })

