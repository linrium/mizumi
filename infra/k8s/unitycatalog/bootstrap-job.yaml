apiVersion: batch/v1
kind: Job
metadata:
  name: unitycatalog-bootstrap
  namespace: unitycatalog
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: unitycatalog-bootstrap-sa
      initContainers:
        - name: wait-for-uc
          image: busybox:stable
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until wget -qO- http://unitycatalog-svc.unitycatalog.svc.cluster.local:8080/readyz; do
                echo "waiting for unitycatalog..."; sleep 3
              done
              echo "unitycatalog ready"
        - name: create-buckets
          image: minio/mc:latest
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc mb --ignore-existing rustfs/unitycatalog
              echo "bucket ready"
        - name: create-topics
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.11
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              BROKERS="redpanda-svc.redpanda.svc.cluster.local:9092"
              for topic in hdbank.partner_events_v1 vietjetair.partner_events_v1; do
                rpk topic create "$topic" --brokers "$BROKERS" || true
              done
              echo "topics ready"
      containers:
        - name: bootstrap
          image: python:3.11-alpine
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - sh
            - -c
            - /scripts/init.sh
          env:
            - name: UC_URL
              value: http://unitycatalog-svc:8080
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: token
              mountPath: /token
      volumes:
        - name: scripts
          configMap:
            name: unitycatalog-bootstrap-script
            defaultMode: 0755
        - name: token
          secret:
            secretName: unitycatalog-auth
            items:
              - key: UC_INTERNAL_SERVICE_TOKEN
                path: uc-token
