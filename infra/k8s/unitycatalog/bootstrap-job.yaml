apiVersion: v1
kind: ServiceAccount
metadata:
  name: unitycatalog-bootstrap-sa
  namespace: unitycatalog
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unitycatalog-bootstrap-script
  namespace: unitycatalog
data:
  init.sh: |
    #!/bin/sh
    set -eu

    UC_URL="${UC_URL:-http://unitycatalog-svc:8080}"
    UC_TOKEN_FILE="${UC_TOKEN_FILE:-/token/uc-token}"

    if [ ! -f "$UC_TOKEN_FILE" ]; then
      echo "missing UC token file: $UC_TOKEN_FILE" >&2
      exit 1
    fi

    UC_TOKEN="$(cat "$UC_TOKEN_FILE")"
    export UC_URL UC_TOKEN

    python3 <<'PY'
    import json
    import os
    import re
    import sys
    import urllib.error
    import urllib.parse
    import urllib.request

    base_url = os.environ["UC_URL"].rstrip("/")
    token = os.environ["UC_TOKEN"]


    def request(method: str, path: str, payload: dict | None = None):
        req = urllib.request.Request(
            f"{base_url}{path}",
            headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
            },
            data=None if payload is None else json.dumps(payload).encode(),
            method=method,
        )
        try:
            with urllib.request.urlopen(req) as resp:
                body = resp.read().decode()
                if body:
                    print(body)
                    return json.loads(body)
                return None
        except urllib.error.HTTPError as err:
            body = err.read().decode()
            if err.code == 409:
                print(f"already exists: {path}")
                return None
            print(f"{method} {path} failed: {err.code} {body}", file=sys.stderr)
            raise


    def list_catalog_names() -> set[str]:
        response = request("GET", "/api/2.1/unity-catalog/catalogs")
        return {catalog["name"] for catalog in (response or {}).get("catalogs", [])}


    def list_schema_names(catalog_name: str) -> set[str]:
        response = request("GET", f"/api/2.1/unity-catalog/schemas?catalog_name={catalog_name}")
        return {schema["name"] for schema in (response or {}).get("schemas", [])}


    def list_table_names(catalog_name: str, schema_name: str) -> set[str]:
        response = request(
            "GET",
            f"/api/2.1/unity-catalog/tables?catalog_name={catalog_name}&schema_name={schema_name}",
        )
        return {table["name"] for table in (response or {}).get("tables", [])}


    def get_table(catalog_name: str, schema_name: str, table_name: str) -> dict | None:
        full_name = f"{catalog_name}.{schema_name}.{table_name}"
        encoded = urllib.parse.quote(full_name, safe="")
        try:
            return request("GET", f"/api/2.1/unity-catalog/tables/{encoded}")
        except urllib.error.HTTPError as err:
            if err.code == 404:
                return None
            raise


    def delete_table(catalog_name: str, schema_name: str, table_name: str) -> None:
        full_name = f"{catalog_name}.{schema_name}.{table_name}"
        encoded = urllib.parse.quote(full_name, safe="")
        request("DELETE", f"/api/2.1/unity-catalog/tables/{encoded}")


    def table_matches(existing: dict, desired: dict) -> bool:
        if existing.get("storage_location") != desired["storage_location"]:
            return False

        existing_columns = existing.get("columns") or []
        desired_columns = desired["columns"]
        if len(existing_columns) != len(desired_columns):
            return False

        comparable_fields = (
            "name",
            "type_name",
            "type_text",
            "type_json",
            "position",
            "nullable",
            "partition_index",
        )
        for existing_col, desired_col in zip(existing_columns, desired_columns):
            for field in comparable_fields:
                if existing_col.get(field) != desired_col.get(field):
                    return False
        return True


    def ensure_catalog(catalog_name: str, comment: str, existing_catalogs: set[str]) -> None:
        if catalog_name in existing_catalogs:
            print(f"already exists: /api/2.1/unity-catalog/catalogs/{catalog_name}")
            return
        try:
            request("POST", "/api/2.1/unity-catalog/catalogs", {"name": catalog_name, "comment": comment})
        except urllib.error.HTTPError:
            refreshed = list_catalog_names()
            if catalog_name not in refreshed:
                raise
            print(f"already exists after retry check: /api/2.1/unity-catalog/catalogs/{catalog_name}")
            existing_catalogs.update(refreshed)
            return
        existing_catalogs.add(catalog_name)


    def ensure_schema(catalog_name: str, schema_name: str, comment: str, existing_schemas: set[str]) -> None:
        if schema_name in existing_schemas:
            print(f"already exists: /api/2.1/unity-catalog/schemas/{catalog_name}.{schema_name}")
            return
        try:
            request(
                "POST",
                "/api/2.1/unity-catalog/schemas",
                {"catalog_name": catalog_name, "name": schema_name, "comment": comment},
            )
        except urllib.error.HTTPError:
            refreshed = list_schema_names(catalog_name)
            if schema_name not in refreshed:
                raise
            print(f"already exists after retry check: /api/2.1/unity-catalog/schemas/{catalog_name}.{schema_name}")
            existing_schemas.update(refreshed)
            return
        existing_schemas.add(schema_name)


    def ensure_table(catalog_name: str, schema_name: str, table: dict, existing_tables: set[str]) -> None:
        table_name = table["name"]
        if table_name in existing_tables:
            existing_table = get_table(catalog_name, schema_name, table_name)
            if existing_table and table_matches(existing_table, table):
                print(f"already exists: /api/2.1/unity-catalog/tables/{catalog_name}.{schema_name}.{table_name}")
                return
            print(f"recreating stale table metadata: /api/2.1/unity-catalog/tables/{catalog_name}.{schema_name}.{table_name}")
            delete_table(catalog_name, schema_name, table_name)
            existing_tables.discard(table_name)
        try:
            request(
                "POST",
                "/api/2.1/unity-catalog/tables",
                {
                    "catalog_name": catalog_name,
                    "schema_name": schema_name,
                    "name": table_name,
                    "table_type": "EXTERNAL",
                    "data_source_format": "DELTA",
                    "columns": table["columns"],
                    "url": table["storage_location"],
                    "comment": table["comment"],
                },
            )
        except urllib.error.HTTPError:
            refreshed = list_table_names(catalog_name, schema_name)
            if table_name not in refreshed:
                raise
            print(f"already exists after retry check: /api/2.1/unity-catalog/tables/{catalog_name}.{schema_name}.{table_name}")
            existing_tables.update(refreshed)
            return
        existing_tables.add(table_name)


    def list_volume_names(catalog_name: str, schema_name: str) -> set[str]:
        response = request(
            "GET",
            f"/api/2.1/unity-catalog/volumes?catalog_name={catalog_name}&schema_name={schema_name}",
        )
        return {v["name"] for v in (response or {}).get("volumes", [])}


    def ensure_volume(catalog_name: str, schema_name: str, volume: dict, existing_volumes: set[str]) -> None:
        volume_name = volume["name"]
        if volume_name in existing_volumes:
            print(f"already exists: /api/2.1/unity-catalog/volumes/{catalog_name}.{schema_name}.{volume_name}")
            return
        try:
            request(
                "POST",
                "/api/2.1/unity-catalog/volumes",
                {
                    "catalog_name": catalog_name,
                    "schema_name": schema_name,
                    "name": volume_name,
                    "volume_type": volume["volume_type"],
                    "storage_location": volume.get("storage_location"),
                    "comment": volume.get("comment"),
                },
            )
        except urllib.error.HTTPError:
            refreshed = list_volume_names(catalog_name, schema_name)
            if volume_name not in refreshed:
                raise
            print(f"already exists after retry check: /api/2.1/unity-catalog/volumes/{catalog_name}.{schema_name}.{volume_name}")
            existing_volumes.update(refreshed)
            return
        existing_volumes.add(volume_name)


    def list_model_names(catalog_name: str, schema_name: str) -> set[str]:
        response = request(
            "GET",
            f"/api/2.1/unity-catalog/models?catalog_name={catalog_name}&schema_name={schema_name}",
        )
        return {m["name"] for m in (response or {}).get("registered_models", [])}


    def ensure_registered_model(catalog_name: str, schema_name: str, model: dict, existing_models: set[str]) -> None:
        model_name = model["name"]
        if model_name in existing_models:
            print(f"already exists: /api/2.1/unity-catalog/models/{catalog_name}.{schema_name}.{model_name}")
            return
        try:
            request(
                "POST",
                "/api/2.1/unity-catalog/models",
                {
                    "catalog_name": catalog_name,
                    "schema_name": schema_name,
                    "name": model_name,
                    "comment": model.get("comment"),
                    "storage_location": model.get("storage_location"),
                },
            )
        except urllib.error.HTTPError:
            refreshed = list_model_names(catalog_name, schema_name)
            if model_name not in refreshed:
                raise
            print(f"already exists after retry check: /api/2.1/unity-catalog/models/{catalog_name}.{schema_name}.{model_name}")
            existing_models.update(refreshed)
            return
        existing_models.add(model_name)


