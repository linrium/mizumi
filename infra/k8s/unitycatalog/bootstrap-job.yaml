apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unitycatalog-bootstrap-role
  namespace: unitycatalog
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unitycatalog-bootstrap-rb
  namespace: unitycatalog
subjects:
  - kind: ServiceAccount
    name: unitycatalog-bootstrap-sa
    namespace: unitycatalog
roleRef:
  kind: Role
  name: unitycatalog-bootstrap-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: unitycatalog-bootstrap
  namespace: unitycatalog
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: unitycatalog-bootstrap-sa
      initContainers:
        - name: wait-for-uc
          image: busybox:stable
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until wget -qO- http://unitycatalog-svc.unitycatalog.svc.cluster.local:8080/readyz; do
                echo "waiting for unitycatalog..."; sleep 3
              done
              echo "unitycatalog ready"
        - name: fetch-token
          image: bitnami/kubectl:latest
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - sh
            - -c
            - |
              POD=$(kubectl get pod -n unitycatalog -l app=unitycatalog -o jsonpath='{.items[0].metadata.name}')
              kubectl exec -n unitycatalog "$POD" -- cat /app/config/token.txt > /token/uc-token
              echo "Token fetched."
          volumeMounts:
            - name: token
              mountPath: /token
        - name: create-buckets
          image: minio/mc:latest
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc mb --ignore-existing rustfs/unitycatalog
              echo "buckets ready"
        - name: create-topics
          image: redpandadata/redpanda:latest
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              BROKERS="redpanda-svc.redpanda.svc.cluster.local:9092"
              for topic in \
                hdbank.hdbank_payments_prod_bronze.raw_card_payment_events_v1 \
                hdbank.hdbank_payments_prod_bronze.raw_customer_events_v1 \
                vietjetair.vietjetair_bookings_prod_bronze.raw_customer_events_v1 \
                vietjetair.vietjetair_bookings_prod_bronze.raw_flight_events_v1 \
                vietjetair.vietjetair_bookings_prod_bronze.raw_booking_events_v1; do
                rpk topic create "$topic" --brokers "$BROKERS" || true
              done
              echo "topics ready"

      containers:
        - name: bootstrap
          image: python:3.11-alpine
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          command:
            - sh
            - -c
            - |
              cat > /tmp/bootstrap.py << 'PYEOF'
              import json, os, sys, urllib.request, urllib.error

              UC = "http://unitycatalog-svc:8080/api/2.1/unity-catalog"
              TOKEN = os.environ.get("UC_TOKEN", "")

              def _headers(extra=None):
                  h = {}
                  if TOKEN:
                      h["Authorization"] = f"Bearer {TOKEN}"
                  if extra:
                      h.update(extra)
                  return h

              def post(path, data):
                  req = urllib.request.Request(
                      f"{UC}/{path}",
                      data=json.dumps(data).encode(),
                      headers=_headers({"Content-Type": "application/json"}),
                      method="POST",
                  )
                  try:
                      with urllib.request.urlopen(req) as r:
                          print("  ok:", json.loads(r.read()).get("name", ""))
                  except urllib.error.HTTPError as e:
                      msg = e.read().decode()
                      if e.code == 409:
                          print("  already exists")
                      else:
                          print(f"  ERROR {e.code}: {msg[:300]}", file=sys.stderr)

              def col(name, type_name, type_text, json_type, pos, nullable=True, partition_index=-1):
                  return {
                      "name": name,
                      "type_text": type_text,
                      "type_json": json.dumps({
                          "name": name,
                          "type": json_type,
                          "nullable": nullable,
                          "metadata": {},
                      }, separators=(",", ":")),
                      "type_name": type_name,
                      "type_precision": 0,
                      "type_scale": 0,
                      "type_interval_type": "",
                      "position": pos,
                      "comment": "",
                      "nullable": nullable,
                      "partition_index": partition_index,
                  }

              def build_cols(specs):
                  return [col(name, type_name, type_text, json_type, pos) for pos, (name, type_name, type_text, json_type) in enumerate(specs)]

              HDBANK_RAW_CARD_PAYMENT_EVENTS_V1 = build_cols([
                  ("timestamp", "TIMESTAMP", "timestamp", "timestamp"),
