        "uc": "UC",
        "url": "URL",
        "utc": "UTC",
        "v1": "v1",
        "vietjet": "VietJet",
        "vietjetair": "VietJet Air",
    }


    def default_column_comment(name: str) -> str:
        normalized = re.sub(r"([a-z0-9])([A-Z])", r"\\1_\\2", name)
        words = [part for part in normalized.split("_") if part]
        if not words:
            return ""

        rendered: list[str] = []
        for word in words:
            token = TOKEN_LABELS.get(word.lower())
            rendered.append(token if token is not None else word.lower())

        comment = " ".join(rendered)
        return comment[:1].upper() + comment[1:]


    def col(name: str, type_name: str, type_text: str, json_type: str, pos: int, comment: str | None = None) -> dict:
        return {
            "name": name,
            "type_text": type_text,
            "type_json": json.dumps(
                {"name": name, "type": json_type, "nullable": True, "metadata": {}},
                separators=(",", ":"),
            ),
            "type_name": type_name,
            "type_precision": 0,
            "type_scale": 0,
            "type_interval_type": "",
            "position": pos,
            "comment": default_column_comment(name) if comment is None else comment,
            "nullable": True,
            "partition_index": -1,
        }


