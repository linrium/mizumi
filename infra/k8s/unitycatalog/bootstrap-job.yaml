    def build_cols(table_key: str, specs: list[tuple[str, str, str, str] | tuple[str, str, str, str, str]]) -> list[dict]:
        built: list[dict] = []
        comments = TABLE_COLUMN_COMMENTS.get(table_key, {})
        for pos, spec in enumerate(specs):
            if len(spec) == 4:
                name, type_name, type_text, json_type = spec
                built.append(col(name, type_name, type_text, json_type, pos, comments.get(name)))
            else:
                name, type_name, type_text, json_type, comment = spec
                built.append(col(name, type_name, type_text, json_type, pos, comment))
        return built


