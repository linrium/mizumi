apiVersion: batch/v1
kind: Job
metadata:
  name: unitycatalog-bootstrap
  namespace: unitycatalog
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: create-buckets
          image: minio/mc:latest
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc mb --ignore-existing rustfs/unitycatalog
              echo "buckets ready"
      containers:
        - name: bootstrap
          image: mizumi-unitycatalog:v0.4.0
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          command:
            - /bin/sh
            - -ec
            - |
              if [ -x /usr/lib/jvm/default-jvm/bin/java ]; then
                export JAVA_HOME=/usr/lib/jvm/default-jvm
                export PATH="$JAVA_HOME/bin:$PATH"
              fi

              if [ -x /home/unitycatalog/bin/uc ]; then
                UC_BIN=/home/unitycatalog/bin/uc
              else
                UC_BIN="$(command -v uc || true)"
              fi

              if [ -z "$UC_BIN" ]; then
                echo "unable to find the Unity Catalog CLI binary" >&2
                exit 1
              fi

              UC_SERVER=http://unitycatalog-svc:8080

              uc() {
                "$UC_BIN" --server "$UC_SERVER" "$@"
              }

              create_catalog() {
                name="$1"
                comment="$2"

                if uc catalog get --name "$name" >/dev/null 2>&1; then
                  echo "catalog exists: $name"
                  return
                fi

                echo "creating catalog: $name"
                uc catalog create --name "$name" --comment "$comment"
              }

              create_schema() {
                catalog="$1"
                name="$2"
                comment="$3"
                full_name="$catalog.$name"

                if uc schema get --full_name "$full_name" >/dev/null 2>&1; then
                  echo "schema exists: $full_name"
                  return
                fi

                echo "creating schema: $full_name"
                uc schema create --catalog "$catalog" --name "$name" --comment "$comment"
              }

              create_table() {
                full_name="$1"
                columns="$2"
                storage_location="$3"
                format="${4:-DELTA}"

                if uc table get --full_name "$full_name" >/dev/null 2>&1; then
                  echo "table exists: $full_name"
                  return
                fi

                echo "creating table: $full_name"
                uc table create \
                  --full_name "$full_name" \
                  --columns "$columns" \
                  --storage_location "$storage_location" \
                  --format "$format"
              }

              echo "waiting for Unity Catalog CLI endpoint at $UC_SERVER"
              ready=0
              attempts=0
              while [ "$attempts" -lt 60 ]; do
                if wget -q -O /dev/null "$UC_SERVER/api/2.1/unity-catalog/catalogs"; then
                  ready=1
                  break
                fi
                attempts=$((attempts + 1))
                sleep 5
              done

              if [ "$ready" -ne 1 ]; then
                echo "Unity Catalog did not become ready in time" >&2
                exit 1
              fi

              "$UC_BIN" --help >/dev/null

              create_catalog "hdbank" "HDBank demo catalog with Kafka bronze events and banking silver/gold marts"
              create_schema "hdbank" "hdbank_payments_prod_bronze" "Raw HDBank Kafka events for payments and customers"
              create_table \
                "hdbank.hdbank_payments_prod_bronze.raw_card_payment_events_v1" \
                "timestamp TIMESTAMP, key STRING, value STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_bronze/raw_card_payment_events_v1"
              create_table \
                "hdbank.hdbank_payments_prod_bronze.raw_customer_events_v1" \
                "timestamp TIMESTAMP, key STRING, value STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_bronze/raw_customer_events_v1"

              create_schema "hdbank" "hdbank_payments_prod_silver" "Conformed HDBank payment and customer entities"
              create_table \
                "hdbank.hdbank_payments_prod_silver.card_payment_events_v1" \
                "payment_event_id STRING, customer_id STRING, account_id STRING, transaction_reference STRING, merchant_name STRING, merchant_category STRING, amount DOUBLE, currency STRING, payment_timestamp TIMESTAMP, note STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_silver/card_payment_events_v1"
              create_table \
                "hdbank.hdbank_payments_prod_silver.customers_v1" \
                "customer_id STRING, customer_name STRING, segment_name STRING, kyc_status STRING, preferred_channel STRING, updated_at TIMESTAMP" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_silver/customers_v1"

              create_schema "hdbank" "hdbank_payments_prod_gold" "Business-ready HDBank risk and monetization marts"
              create_table \
                "hdbank.hdbank_payments_prod_gold.risk_detection_v1" \
                "detection_date DATE, payment_event_id STRING, customer_id STRING, account_id STRING, risk_label STRING, risk_score DOUBLE, note_signal STRING, model_version STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_gold/risk_detection_v1"
              create_table \
                "hdbank.hdbank_payments_prod_gold.merchant_revenue_v1" \
                "business_date DATE, merchant_name STRING, merchant_category STRING, transaction_count INT, gross_payment_volume DOUBLE, fee_revenue DOUBLE, currency STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_gold/merchant_revenue_v1"
              create_table \
                "hdbank.hdbank_payments_prod_gold.user_spend_v1" \
                "business_date DATE, customer_id STRING, account_id STRING, transaction_count INT, total_spend DOUBLE, avg_ticket_size DOUBLE, top_merchant_category STRING, currency STRING" \
                "s3://unitycatalog/hdbank/hdbank_payments_prod_gold/user_spend_v1"

              create_catalog "vietjetair" "VietJet Air demo catalog with Kafka bronze events and aviation silver/gold marts"
              create_schema "vietjetair" "vietjetair_bookings_prod_bronze" "Raw VietJet Kafka events for customers, flights, and bookings"
              create_table \
                "vietjetair.vietjetair_bookings_prod_bronze.raw_customer_events_v1" \
                "timestamp TIMESTAMP, key STRING, value STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_bronze/raw_customer_events_v1"
              create_table \
                "vietjetair.vietjetair_bookings_prod_bronze.raw_flight_events_v1" \
                "timestamp TIMESTAMP, key STRING, value STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_bronze/raw_flight_events_v1"
              create_table \
                "vietjetair.vietjetair_bookings_prod_bronze.raw_booking_events_v1" \
                "timestamp TIMESTAMP, key STRING, value STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_bronze/raw_booking_events_v1"

              create_schema "vietjetair" "vietjetair_bookings_prod_silver" "Conformed VietJet customer, flight, and booking entities"
              create_table \
                "vietjetair.vietjetair_bookings_prod_silver.ticket_bookings_v1" \
                "booking_id STRING, customer_id STRING, pnr_code STRING, payment_reference STRING, route_code STRING, ticket_amount DOUBLE, currency STRING, booking_timestamp TIMESTAMP" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_silver/ticket_bookings_v1"
              create_table \
                "vietjetair.vietjetair_bookings_prod_silver.customers_v1" \
                "customer_id STRING, customer_name STRING, membership_tier STRING, home_airport STRING, email_opt_in BOOLEAN, updated_at TIMESTAMP" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_silver/customers_v1"
              create_table \
                "vietjetair.vietjetair_bookings_prod_silver.flights_v1" \
                "flight_id STRING, flight_number STRING, route_code STRING, departure_airport STRING, arrival_airport STRING, scheduled_departure_time TIMESTAMP, aircraft_type STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_silver/flights_v1"

              create_schema "vietjetair" "vietjetair_bookings_prod_gold" "Business-ready VietJet revenue and customer value marts"
              create_table \
                "vietjetair.vietjetair_bookings_prod_gold.booking_revenue_v1" \
                "business_date DATE, route_code STRING, booking_count INT, ticket_revenue DOUBLE, ancillary_revenue DOUBLE, currency STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_gold/booking_revenue_v1"
              create_table \
                "vietjetair.vietjetair_bookings_prod_gold.customer_spend_v1" \
                "business_date DATE, customer_id STRING, booking_count INT, total_ticket_spend DOUBLE, avg_booking_value DOUBLE, favorite_route_code STRING, currency STRING" \
                "s3://unitycatalog/vietjetair/vietjetair_bookings_prod_gold/customer_spend_v1"

              echo "bootstrap complete"
              uc table list --catalog hdbank --schema hdbank_payments_prod_bronze
              uc table list --catalog hdbank --schema hdbank_payments_prod_silver
              uc table list --catalog hdbank --schema hdbank_payments_prod_gold
              uc table list --catalog vietjetair --schema vietjetair_bookings_prod_bronze
              uc table list --catalog vietjetair --schema vietjetair_bookings_prod_silver
              uc table list --catalog vietjetair --schema vietjetair_bookings_prod_gold
