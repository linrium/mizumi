apiVersion: v1
kind: ConfigMap
metadata:
  name: unitycatalog-config
  namespace: unitycatalog
data:
  server.toml: |
    [server]
    env = "dev"
    host = "0.0.0.0"
    port = 8080
    public_url = "http://localhost:8082"
    authorization = "enable"
    authorization_url = "http://keycloak-svc.keycloak.svc.cluster.local:8080/realms/sovico/protocol/openid-connect/auth"
    token_url = "http://keycloak-svc.keycloak.svc.cluster.local:8080/realms/sovico/protocol/openid-connect/token"
    client_id = "webui"
    client_secret = "webui-secret"
    redirect_port = 8082
    allowed_issuers = [
      "http://keycloak-svc.keycloak.svc.cluster.local:8080/realms/sovico",
      "http://127.0.0.1:8083/realms/sovico",
      "http://localhost:8083/realms/sovico",
    ]
    audiences = ["webui"]
    cookie_timeout = "P5D"

    [server.managed_table]
    enabled = true

    [database]
    url = "postgres://ucuser:ucpassword@shared-postgres-svc.shared-postgres.svc.cluster.local:5432/ucdb"
    max_connections = 20

    [[s3]]
    bucket_path = "s3://unitycatalog/"
    region = "us-east-1"
    access_key = "rustfsadmin"
    secret_key = "rustfsadmin"
    endpoint = "http://rustfs-svc.rustfs.svc.cluster.local:9000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unitycatalog
  namespace: unitycatalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unitycatalog
  template:
    metadata:
      labels:
        app: unitycatalog
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      containers:
        - name: unitycatalog
          image: mizumi-uc:0.1.0
          imagePullPolicy: Always
          # imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 8080
              name: rest
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: RUST_LOG
              value: debug
            - name: OTEL_SERVICE_NAME
              value: "unitycatalog"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment.name=development,k8s.cluster.name=mizumi,service.namespace=unitycatalog"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://signoz-ingester.signoz.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "15000"
            - name: UC__DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: UC_INTERNAL_SERVER_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: unitycatalog-auth
                  key: UC_INTERNAL_SERVER_KEY_PEM
                  optional: true
            - name: UC_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unitycatalog-auth
                  key: UC_INTERNAL_SERVICE_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config/server.toml
              subPath: server.toml
      volumes:
        - name: config
          configMap:
            name: unitycatalog-config
---
apiVersion: v1
kind: Service
metadata:
  name: unitycatalog-svc
  namespace: unitycatalog
spec:
  selector:
    app: unitycatalog
  ports:
    - name: rest
      port: 8080
      targetPort: 8080
