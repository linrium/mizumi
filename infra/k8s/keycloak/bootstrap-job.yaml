apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-secret
  namespace: keycloak
type: Opaque
stringData:
  KEYCLOAK_REALM: sovico
  KEYCLOAK_COMPANY_GROUPS: '["vietjetair","hdbank"]'
  KEYCLOAK_CLIENT_ID: webui
  KEYCLOAK_CLIENT_SECRET: webui-secret
  KEYCLOAK_USER_PASSWORD: "123"
  KEYCLOAK_USER_ID_LINH: "4faec421-980b-40e7-9997-ce2488ac5968"
  KEYCLOAK_USER_ID_KHAOSOI: "f6138570-3008-4bcd-8c32-8ae72fce2ac7"
  KEYCLOAK_USER_ID_KHAOPAD: "590df6ab-a6d9-418c-b89e-8ed3a26cdc7e"
  KEYCLOAK_USER_ID_RIKKI: "508f5a7a-f4b4-421a-bbb0-5968f710bd50"
  KEYCLOAK_CLIENT_REDIRECT_URIS: '["http://localhost:3000/api/auth/oauth2/callback/keycloak", "http://localhost:8082/auth/callback"]'
  KEYCLOAK_CLIENT_WEB_ORIGINS: '["http://localhost:3000","http://localhost:8082"]'
  KEYCLOAK_CLIENT_POST_LOGOUT_REDIRECT_URIS: '["http://localhost:3000/login"]'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  namespace: keycloak
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: busybox:stable
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until wget -qO- http://keycloak-svc.keycloak.svc.cluster.local:8080/realms/master; do
                echo "waiting for keycloak..."; sleep 3
              done
              echo "keycloak ready"
      containers:
        - name: bootstrap
          image: quay.io/keycloak/keycloak:26.3.3
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak-svc:8080
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_COMPANY_GROUPS
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_COMPANY_GROUPS
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_USER_PASSWORD
            - name: KEYCLOAK_CLIENT_REDIRECT_URIS
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_CLIENT_REDIRECT_URIS
            - name: KEYCLOAK_CLIENT_WEB_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_CLIENT_WEB_ORIGINS
            - name: KEYCLOAK_CLIENT_POST_LOGOUT_REDIRECT_URIS
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_CLIENT_POST_LOGOUT_REDIRECT_URIS
            - name: KEYCLOAK_USER_ID_LINH
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_USER_ID_LINH
            - name: KEYCLOAK_USER_ID_KHAOSOI
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_USER_ID_KHAOSOI
            - name: KEYCLOAK_USER_ID_KHAOPAD
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_USER_ID_KHAOPAD
            - name: KEYCLOAK_USER_ID_RIKKI
              valueFrom:
                secretKeyRef:
                  name: keycloak-bootstrap-secret
                  key: KEYCLOAK_USER_ID_RIKKI
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              login() {
                /opt/keycloak/bin/kcadm.sh config credentials \
                  --server "$KEYCLOAK_URL" \
                  --realm master \
                  --user "$KEYCLOAK_ADMIN" \
                  --password "$KEYCLOAK_ADMIN_PASSWORD"
              }

              login

              ensure_realm() {
                local realm_name="$1"

                if /opt/keycloak/bin/kcadm.sh get "realms/$realm_name" >/dev/null 2>&1; then
                  echo "Realm $realm_name already exists"
                else
                  /opt/keycloak/bin/kcadm.sh create realms \
                    -s realm="$realm_name" \
                    -s enabled=true
                  echo "Created realm $realm_name"
                fi
              }

              ensure_group() {
                local realm_name="$1"
                local group_name="$2"

                if /opt/keycloak/bin/kcadm.sh get groups -r "$realm_name" -q search="$group_name" \
                  | grep -q "\"name\" : \"$group_name\""; then
                  echo "Group $group_name already exists in realm $realm_name"
                else
                  /opt/keycloak/bin/kcadm.sh create groups -r "$realm_name" \
                    -s name="$group_name"
                  echo "Created group $group_name in realm $realm_name"
                fi
              }

              get_user_id() {
                local realm_name="$1"
                local username="$2"

                /opt/keycloak/bin/kcadm.sh get users -r "$realm_name" -q username="$username" \
                  | sed -n 's/.*"id" : "\([^"]*\)".*/\1/p' \
                  | head -n1
              }

              ensure_user() {
                local realm_name="$1"
                local username="$2"
                local user_id
                user_id=$(get_user_id "$realm_name" "$username")

                if [[ -z "$user_id" ]]; then
                  /opt/keycloak/bin/kcadm.sh create users -r "$realm_name" \
                    -s username="$username" \
                    -s email="$username" \
                    -s enabled=true \
                    -s emailVerified=true \
                    -s requiredActions=[]
                  user_id=$(get_user_id "$realm_name" "$username")
                  echo "Created user $username with id $user_id"
                else
                  /opt/keycloak/bin/kcadm.sh update "users/$user_id" -r "$realm_name" \
                    -s email="$username" \
                    -s enabled=true \
                    -s emailVerified=true \
                    -s requiredActions=[]
                  echo "Updated user $username (id $user_id)"
                fi

                /opt/keycloak/bin/kcadm.sh set-password -r "$realm_name" \
                  --userid "$user_id" \
                  --new-password "$KEYCLOAK_USER_PASSWORD" \
                  --temporary=false
              }

              get_client_id() {
                local realm_name="$1"

                /opt/keycloak/bin/kcadm.sh get clients -r "$realm_name" -q clientId="$KEYCLOAK_CLIENT_ID" \
                  | sed -n 's/.*"id" : "\([^"]*\)".*/\1/p' \
                  | head -n1
              }

              ensure_client() {
                local realm_name="$1"
                local client_uuid
                client_uuid=$(get_client_id "$realm_name")

                cat > /tmp/keycloak-client.json <<EOF
              {
                "clientId": "$KEYCLOAK_CLIENT_ID",
                "enabled": true,
                "protocol": "openid-connect",
                "publicClient": false,
                "bearerOnly": false,
                "standardFlowEnabled": true,
                "directAccessGrantsEnabled": true,
                "serviceAccountsEnabled": true,
                "clientAuthenticatorType": "client-secret",
                "secret": "$KEYCLOAK_CLIENT_SECRET",
                "redirectUris": $KEYCLOAK_CLIENT_REDIRECT_URIS,
                "webOrigins": $KEYCLOAK_CLIENT_WEB_ORIGINS,
                "attributes": {
                  "logout.confirmation.screen": "false"
                }
              }
              EOF

                if [[ -z "$client_uuid" ]]; then
                  client_uuid=$(/opt/keycloak/bin/kcadm.sh create clients -r "$realm_name" -f /tmp/keycloak-client.json -i)
                  echo "Created client $KEYCLOAK_CLIENT_ID in realm $realm_name"
                else
                  /opt/keycloak/bin/kcadm.sh update "clients/$client_uuid" -r "$realm_name" -f /tmp/keycloak-client.json
                  echo "Updated client $KEYCLOAK_CLIENT_ID in realm $realm_name"
                fi
              }

              ensure_realm "$KEYCLOAK_REALM"

              for group_name in $(echo "$KEYCLOAK_COMPANY_GROUPS" | tr -d '[]"' | tr ',' ' '); do
                ensure_group "$KEYCLOAK_REALM" "$group_name"
              done

              ensure_user "$KEYCLOAK_REALM" "linh@gmail.com"
              ensure_user "$KEYCLOAK_REALM" "khaosoi@gmail.com"
              ensure_user "$KEYCLOAK_REALM" "khaopad@gmail.com"
              ensure_user "$KEYCLOAK_REALM" "rikki@gmail.com"
              ensure_client "$KEYCLOAK_REALM"

              echo "Keycloak bootstrap complete."
