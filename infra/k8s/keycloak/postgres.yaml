apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres-secret
  namespace: keycloak
type: Opaque
stringData:
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: keycloak
  DATABASE_URL: "postgres://keycloak:keycloak@dagster-postgresql.dagster.svc.cluster.local:5432/keycloak"
