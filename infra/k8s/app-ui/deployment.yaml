apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ui
  namespace: app-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-ui
  template:
    metadata:
      labels:
        app: app-ui
    spec:
      containers:
        - name: app-ui
          image: mizumi-app-ui:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: production
            - name: KEYCLOAK_REALM
              value: mizumi
            - name: KEYCLOAK_CLIENT_ID
              value: mizumi-client
            - name: KEYCLOAK_CLIENT_SECRET
              value: mizumi-client-secret
            - name: KEYCLOAK_PUBLIC_BASE_URL
              value: http://127.0.0.1:8083
            - name: KEYCLOAK_INTERNAL_BASE_URL
              value: http://keycloak-svc.keycloak.svc.cluster.local:8080
            - name: AUTH_SECRET
              value: mizumi-app-ui-dev-auth-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: app-ui-svc
  namespace: app-ui
spec:
  selector:
    app: app-ui
  ports:
    - port: 3000
      targetPort: 3000
