apiVersion: batch/v1
kind: Job
metadata:
  name: duckdb-rustfs-query
  namespace: spark
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: duckdb-query
          image: mizumi-duckdb:1.1.5
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          command:
            - /bin/sh
            - -lc
            - |
              cp /etc/rustfs-s3-proxy/tls.crt /usr/local/share/ca-certificates/rustfs-s3-proxy.crt
              update-ca-certificates
              python /opt/duckdb/query_api.py
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ENDPOINT_URL
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              value: rustfsadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: rustfsadmin
            - name: DUCKDB_DELTA_PATH
              value: s3://gold/sdp-warehouse/silver_orders
            - name: DUCKDB_CA_CERT_PATH
              value: /etc/rustfs-s3-proxy/tls.crt
          volumeMounts:
            - name: rustfs-s3-proxy-tls
              mountPath: /etc/rustfs-s3-proxy
              readOnly: true
      volumes:
        - name: rustfs-s3-proxy-tls
          secret:
            secretName: rustfs-s3-proxy-tls
  backoffLimit: 0
