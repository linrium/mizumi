apiVersion: v1
kind: Namespace
metadata:
  name: shared-postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-postgres-secret
  namespace: shared-postgres
type: Opaque
stringData:
  POSTGRES_DB: platform
  POSTGRES_USER: platform_admin
  POSTGRES_PASSWORD: platform_admin_password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shared-postgres
  namespace: shared-postgres
spec:
  serviceName: shared-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: shared-postgres
  template:
    metadata:
      annotations:
        signoz.io/path: /metrics
        signoz.io/port: "9187"
        signoz.io/scrape: "true"
      labels:
        app: shared-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: 127.0.0.1:5432/platform?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-secret
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: shared-postgres-svc
  namespace: shared-postgres
spec:
  selector:
    app: shared-postgres
  ports:
    - port: 5432
      targetPort: 5432
