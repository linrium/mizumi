replicaCount: 1

mode:
  standalone:
    enabled: true
  distributed:
    enabled: false

secret:
  rustfs:
    access_key: rustfsadmin
    secret_key: rustfsadmin

config:
  rustfs:
    address: ":9000"
    console_enable: "true"
    console_address: ":9001"
    log_level: "info"
    region: "us-east-1"
    obs_environment: "development"
    obs_endpoint:
      enabled: true
      base_endpoint: "http://signoz-ingester.signoz.svc.cluster.local:4318"
      use_stdout: false
      metrics:
        enabled: true
        endpoint: "http://signoz-ingester.signoz.svc.cluster.local:4318/v1/metrics"
      trace:
        enabled: true
        endpoint: "http://signoz-ingester.signoz.svc.cluster.local:4318/v1/traces"
      logs:
        enabled: true
        endpoint: "http://signoz-ingester.signoz.svc.cluster.local:4318/v1/logs"

service:
  type: ClusterIP

ingress:
  enabled: false

storageclass:
  name: standard
  dataStorageSize: 512Mi
  logStorageSize: 512Mi

affinity:
  podAntiAffinity:
    enabled: false

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

extraEnv:
  - name: OTEL_SERVICE_NAME
    value: "rustfs"
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "deployment.environment.name=development,k8s.cluster.name=mizumi,service.namespace=rustfs"
  - name: OTEL_EXPORTER_OTLP_PROTOCOL
    value: "http/protobuf"
