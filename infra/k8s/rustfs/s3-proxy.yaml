apiVersion: v1
kind: ConfigMap
metadata:
  name: rustfs-s3-proxy-config
  namespace: rustfs
data:
  Caddyfile: |
    {
      auto_https off
    }

    https://unitycatalog.s3.us-east-1.amazonaws.com {
      log
      tls /certs/tls.crt /certs/tls.key
      rewrite * /unitycatalog{uri}
      reverse_proxy http://rustfs-svc.rustfs.svc.cluster.local:9000 {
        header_up Host rustfs-svc.rustfs.svc.cluster.local:9000
        header_up -Authorization
        header_up -X-Amz-Date
        header_up -X-Amz-Content-Sha256
        header_up -X-Amz-Security-Token
        header_up -X-Amz-User-Agent
        header_up -X-Amz-Decoded-Content-Length
      }
    }

    https://s3.us-east-1.amazonaws.com {
      log
      tls /certs/tls.crt /certs/tls.key
      reverse_proxy http://rustfs-svc.rustfs.svc.cluster.local:9000 {
        header_up Host rustfs-svc.rustfs.svc.cluster.local:9000
        header_up -Authorization
        header_up -X-Amz-Date
        header_up -X-Amz-Content-Sha256
        header_up -X-Amz-Security-Token
        header_up -X-Amz-User-Agent
        header_up -X-Amz-Decoded-Content-Length
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs-s3-proxy
  namespace: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs-s3-proxy
  template:
    metadata:
      labels:
        app: rustfs-s3-proxy
    spec:
      containers:
        - name: caddy
          image: caddy:2.8-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 443
              name: https
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: tls
              mountPath: /certs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: rustfs-s3-proxy-config
        - name: tls
          secret:
            secretName: rustfs-s3-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs-s3-proxy
  namespace: rustfs
spec:
  selector:
    app: rustfs-s3-proxy
  ports:
    - name: https
      port: 443
      targetPort: 443
