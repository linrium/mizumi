apiVersion: v1
kind: Namespace
metadata:
  name: lancedb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lancedb-server
  namespace: lancedb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lancedb-server
  template:
    metadata:
      labels:
        app: lancedb-server
    spec:
      containers:
        - name: lancedb-server
          image: mizumi-lancedb-server:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LANCEDB_URI
              value: s3://lancedb/
            - name: LANCEDB_BUCKET
              value: lancedb
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ENDPOINT_URL
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              value: rustfsadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: rustfsadmin
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lancedb-svc
  namespace: lancedb
spec:
  selector:
    app: lancedb-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
