apiVersion: v1
kind: Namespace
metadata:
  name: synthetic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthetic-server
  namespace: synthetic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synthetic-server
  template:
    metadata:
      labels:
        app: synthetic-server
    spec:
      volumes:
        - name: synthetic-data
          emptyDir: {}
      initContainers:
        - name: rustfs-sync
          image: minio/mc:latest
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mkdir -p /data/current
              if mc stat rustfs/datasets/synthetic/current >/dev/null 2>&1; then
                for file in \
                  vietnamese_residents.csv \
                  hdbank_customers.csv \
                  vietjetair_customers.csv \
                  banking_transactions.csv \
                  flight_tickets.csv \
                  flight_incidents.csv; do
                  mc cp "rustfs/datasets/synthetic/current/${file}" "/data/current/${file}"
                done
              else
                echo "synthetic dataset prefix not found yet; starting with empty local data dir"
              fi
          volumeMounts:
            - name: synthetic-data
              mountPath: /data
      containers:
        - name: synthetic-server
          image: mizumi-synthetic-server:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8092
              name: http
          env:
            - name: PORT
              value: "8092"
            - name: SYNTHETIC_DATA_DIR
              value: "/data/current"
            - name: SEED
              value: "42"
            - name: POOL_RESIDENTS
              value: "500"
            - name: POOL_BANKING_TRANSACTIONS
              value: "5000"
            - name: POOL_FLIGHT_TICKETS
              value: "8092"
            - name: POOL_FLIGHT_INCIDENTS
              value: "1000"
          volumeMounts:
            - name: synthetic-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 768Mi
            limits:
              cpu: 500m
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: synthetic-server-svc
  namespace: synthetic
spec:
  selector:
    app: synthetic-server
  ports:
    - name: http
      port: 8092
      targetPort: 8092
