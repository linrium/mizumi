apiVersion: batch/v1
kind: Job
metadata:
  name: synthetic-bootstrap
  namespace: synthetic
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: minio/mc:latest
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc mb --ignore-existing rustfs/datasets
              mc mb --ignore-existing rustfs/unitycatalog
              mc mb --ignore-existing rustfs/unitycatalog/hdbank
              mc mb --ignore-existing rustfs/unitycatalog/vietjetair
              mc mb --ignore-existing rustfs/unitycatalog/partnership
