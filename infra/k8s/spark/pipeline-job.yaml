apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-medallion-pipeline-submit
  namespace: spark
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: spark-operator-spark
      restartPolicy: Never
      initContainers:
        - name: cleanup-warehouse
          image: minio/mc:latest
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set rustfs http://rustfs-svc.rustfs.svc.cluster.local:9000 rustfsadmin rustfsadmin
              mc rm --recursive --force rustfs/gold/sdp-warehouse/silver_orders 2>/dev/null || true
              mc rm --recursive --force rustfs/gold/sdp-warehouse/gold_daily_country_sales 2>/dev/null || true
              mc rm --recursive --force rustfs/gold/warehouse/silver_orders 2>/dev/null || true
              mc rm --recursive --force rustfs/gold/warehouse/gold_daily_country_sales 2>/dev/null || true
              echo "Warehouse cleaned"
      containers:
        - name: submit
          image: mizumi-spark-rustfs:4.1.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Dspark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
                -Dspark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
            - name: PYTHONWARNINGS
              value: "ignore::UserWarning:pyspark.sql.connect.conf"
          command:
            - /bin/sh
            - -ec
            - |
              spark-pipelines \
                --jars /opt/spark/jars/hadoop-aws-3.4.2.jar,/opt/spark/jars/aws-java-sdk-bundle-1.12.720.jar,/opt/spark/jars/bundle-2.29.52.jar,/opt/spark/jars/analyticsaccelerator-s3-1.2.1.jar,/opt/spark/jars/wildfly-openssl-2.1.4.Final.jar,/opt/spark/jars/unitycatalog-spark_2.13-0.4.1.jar,/opt/spark/jars/unitycatalog-client-0.4.1.jar,/opt/spark/jars/delta-spark_2.13-4.1.0.jar,/opt/spark/jars/delta-storage-4.1.0.jar,/opt/spark/jars/jackson-databind-nullable-0.2.6.jar \
                run \
                --spec /opt/spark/pipelines/medallion_pipeline/spark-pipeline.yaml
