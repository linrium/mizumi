apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-medallion-pipeline-submit
  namespace: spark
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: spark-operator-spark
      restartPolicy: Never
      containers:
        - name: submit
          image: mizumi-spark-rustfs:4.1.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              spark-pipelines \
                --packages org.apache.hadoop:hadoop-aws:3.4.2,com.amazonaws:aws-java-sdk-bundle:1.12.720 \
                --conf spark.jars.ivy=/tmp/.ivy2 \
                run \
                --spec /opt/spark/pipelines/spark-pipeline.yaml
