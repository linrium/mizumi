dagster-user-deployments:
  deployments:
    - name: mizumi
      image:
        repository: mizumi-dagster
        tag: "1.13.4"
        pullPolicy: IfNotPresent
      dagsterApiGrpcArgs:
        - "--python-file"
        - "/app/definitions.py"
      port: 3030
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

dagsterWebserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

dagsterDaemon:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
