dagster-user-deployments:
  deployments:
    - name: mizumi
      image:
        repository: mizumi-dagster
        tag: "1.13.4"
        pullPolicy: Always
      dagsterApiGrpcArgs:
        - "--python-file"
        - "/app/definitions.py"
      port: 3030
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 250m
          memory: 1Gi

dagsterWebserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 125m
      memory: 512Mi

dagsterDaemon:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 125m
      memory: 512Mi

runLauncher:
  type: K8sRunLauncher
  config:
    k8sRunLauncher:
      resources:
        requests:
          cpu: 125m
          memory: 512Mi
        limits:
          cpu: 250m
          memory: 1Gi

postgresql:
  enabled: true
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 125m
        memory: 256Mi
