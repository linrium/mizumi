apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-api
  namespace: app-api
---
# Grants app-api access to manage SparkApplications and read pods/logs in the spark namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-api
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-api
subjects:
  - kind: ServiceAccount
    name: app-api
    namespace: app-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-api
  namespace: app-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-api
  template:
    metadata:
      labels:
        app: app-api
    spec:
      serviceAccountName: app-api
      containers:
        - name: app-api
          image: mizumi-app-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-api-postgres-secret
                  key: DATABASE_URL
            - name: DAGSTER_BASE_URL
              value: "http://dagster-dagster-webserver.dagster.svc.cluster.local:80"
            - name: RUST_LOG
              value: "info"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 6000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: app-api-svc
  namespace: app-api
spec:
  selector:
    app: app-api
  ports:
    - port: 6000
      targetPort: 6000
