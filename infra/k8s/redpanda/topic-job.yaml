apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-default-topic
  namespace: redpanda
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-redpanda
          image: busybox:stable
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until wget -qO- http://redpanda-svc.redpanda.svc.cluster.local:9644/v1/cluster/health_overview; do
                echo "waiting for redpanda..."; sleep 3
              done
              echo "redpanda ready"
      containers:
        - name: rpk
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.11
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              brokers="redpanda-svc.redpanda.svc.cluster.local:9092"

              create_topic() {
                local topic="$1"
                rpk topic create "$topic" \
                  --brokers "$brokers" \
                  --partitions 1 \
                  --replicas 1 \
                  || rpk topic describe "$topic" --brokers "$brokers"
              }

              create_topic "hdbank.partner_events_v1"
              create_topic "vietjetair.partner_events_v1"
