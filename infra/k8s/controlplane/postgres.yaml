apiVersion: v1
kind: Namespace
metadata:
  name: controlplane
---
apiVersion: v1
kind: Secret
metadata:
  name: controlplane-postgres-secret
  namespace: controlplane
type: Opaque
stringData:
  POSTGRES_DB: controlplane
  POSTGRES_USER: controlplane
  POSTGRES_PASSWORD: controlplane_password
  DATABASE_URL: "postgres://controlplane:controlplane_password@controlplane-postgres-svc.controlplane.svc.cluster.local:5432/controlplane"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: controlplane-postgres
  namespace: controlplane
spec:
  serviceName: controlplane-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: controlplane-postgres
  template:
    metadata:
      labels:
        app: controlplane-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: controlplane-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "controlplane", "-d", "controlplane"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: controlplane-postgres-svc
  namespace: controlplane
spec:
  selector:
    app: controlplane-postgres
  ports:
    - port: 5432
      targetPort: 5432
