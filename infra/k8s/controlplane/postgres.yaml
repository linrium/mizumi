apiVersion: v1
kind: Namespace
metadata:
  name: controlplane
---
apiVersion: v1
kind: Secret
metadata:
  name: controlplane-postgres-secret
  namespace: controlplane
type: Opaque
stringData:
  POSTGRES_DB: controlplane
  POSTGRES_USER: controlplane
  POSTGRES_PASSWORD: controlplane_password
  DATABASE_URL: "postgres://controlplane:controlplane_password@shared-postgres-svc.shared-postgres.svc.cluster.local:5432/controlplane"
