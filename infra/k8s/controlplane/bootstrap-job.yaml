apiVersion: batch/v1
kind: Job
metadata:
  name: controlplane-bootstrap
  namespace: controlplane
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:18
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-postgres-secret
                  key: DATABASE_URL
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for migrations to complete..."
              until psql "$DATABASE_URL" -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'team_members'" 2>/dev/null | grep -q "1 row"; do
                sleep 3
              done

