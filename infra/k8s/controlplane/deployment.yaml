apiVersion: v1
kind: ServiceAccount
metadata:
  name: controlplane
  namespace: controlplane
---
# Grants controlplane access to manage SparkApplications and read pods/logs in the spark namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: controlplane
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: controlplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: controlplane
subjects:
  - kind: ServiceAccount
    name: controlplane
    namespace: controlplane
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  namespace: controlplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controlplane
  template:
    metadata:
      labels:
        app: controlplane
    spec:
      serviceAccountName: controlplane
      containers:
        - name: controlplane
          image: mizumi-controlplane:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6000
          env:
            - name: DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-postgres-secret
                  key: DATABASE__URL
            - name: DAGSTER_BASE_URL
              value: "http://dagster-dagster-webserver.dagster.svc.cluster.local:80"
            - name: KAFKA__BOOTSTRAP_SERVERS
              value: "redpanda-svc.redpanda.svc.cluster.local:9092"
            - name: UNITY_CATALOG__BASE_URL
              value: "http://unitycatalog-svc.unitycatalog.svc.cluster.local:8080/api/2.1/unity-catalog"
            - name: KEYCLOAK__URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK__REALM
              value: "mizumi"
            - name: RUST_LOG
              value: "info"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 6000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: controlplane-svc
  namespace: controlplane
spec:
  selector:
    app: controlplane
  ports:
    - port: 6000
      targetPort: 6000
