apiVersion: v1
kind: ServiceAccount
metadata:
  name: controlplane
  namespace: controlplane
---
# Grants controlplane access to manage SparkApplications and read pods/logs in the spark namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: controlplane
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: controlplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: controlplane
subjects:
  - kind: ServiceAccount
    name: controlplane
    namespace: controlplane
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  namespace: controlplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controlplane
  template:
    metadata:
      labels:
        app: controlplane
    spec:
      serviceAccountName: controlplane
      containers:
        - name: controlplane
          image: mizumi-controlplane:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:4000"
            - name: BYPASS_TOKEN
              value: "test"
            - name: DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-postgres-secret
                  key: DATABASE_URL
            - name: DAGSTER__BASE_URL
              value: "http://dagster-dagster-webserver.dagster.svc.cluster.local:80"
            - name: KAFKA__BOOTSTRAP_SERVERS
              value: "redpanda-svc.redpanda.svc.cluster.local:9092"
            - name: UNITY_CATALOG__BASE_URL
              value: "http://unitycatalog-svc.unitycatalog.svc.cluster.local:8080/api/2.1/unity-catalog"
            - name: UNITY_CATALOG__ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unitycatalog-auth
                  key: UC_INTERNAL_SERVICE_TOKEN
            - name: DUCKDB_SERVER__BASE_URL
              value: "http://duckdb-server-svc.spark.svc.cluster.local:8080"
            - name: DUCKDB_UC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unitycatalog-auth
                  key: UC_INTERNAL_SERVICE_TOKEN
            - name: OPENAI__BASE_URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-secret
                  key: OPENAI_BASE_URL
                  optional: true
            - name: OPENAI__API_KEY
              valueFrom:
                secretKeyRef:
                  name: controlplane-secret
                  key: OPENAI_API_KEY
                  optional: true
            - name: RUST_LOG
              value: "debug"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: controlplane-svc
  namespace: controlplane
spec:
  selector:
    app: controlplane
  ports:
    - port: 4000
      targetPort: 4000
