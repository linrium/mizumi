name: rustfs_medallion_pipeline
libraries:
  - glob:
      include: "rustfs_medallion_pipeline.py"
storage: s3a://silver/system/checkpoints/rustfs_medallion_pipeline
database: default
configuration:
  spark.sql.session.timeZone: "UTC"
  spark.sql.shuffle.partitions: "1"
  spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
  spark.hadoop.fs.s3a.endpoint: http://rustfs-svc.rustfs.svc.cluster.local:9000
  spark.hadoop.fs.s3a.path.style.access: "true"
  spark.hadoop.fs.s3a.access.key: rustfsadmin
  spark.hadoop.fs.s3a.secret.key: rustfsadmin
  spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
  spark.hadoop.fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
