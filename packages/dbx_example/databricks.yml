# This is a Databricks asset bundle definition for dbx_example.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbx_example
  uuid: f1c0d0e2-1f4c-4a78-8679-4d61488bdff1

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  bronze_catalog:
    description: The Unity Catalog catalog that contains the bronze upload volume and bronze tables
  silver_catalog:
    description: The Unity Catalog catalog for silver tables
  gold_catalog:
    description: The Unity Catalog catalog for gold tables
  schema:
    description: The schema to use
  bronze_volume:
    description: The UC volume under the bronze catalog/schema that contains the source CSV files

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-71a24f7c-3f73.cloud.databricks.com
    variables:
      bronze_catalog: weaver_linh_sandbox_bronze
      silver_catalog: weaver_linh_sandbox_silver
      gold_catalog: weaver_linh_sandbox_gold
      schema: ${workspace.current_user.short_name}
      bronze_volume: sample_spark_jobs
  prod:
    mode: production
    workspace:
      host: https://dbc-71a24f7c-3f73.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/linh.tran@woven-planet.global to make sure we only have a single copy.
      root_path: /Workspace/Users/linh.tran@woven-planet.global/.bundle/${bundle.name}/${bundle.target}
    variables:
      bronze_catalog: weaver_linh_sandbox_bronze
      silver_catalog: weaver_wovenapp_dev_silver
      gold_catalog: weaver_wovenapp_dev_gold
      schema: prod
      bronze_volume: sample_spark_jobs
    permissions:
      - user_name: linh.tran@woven-planet.global
        level: CAN_MANAGE
