name: Cloud functional tests
on:
  push:
    branches: [main]
  repository_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
env:
  VCPKG_COMMIT_ID: 84bab45d415d22042bd0b9081aea57f362da3f35
  # Pull prebuilt vcpkg packages (OpenSSL etc.) from duckdb's hosted read-only cache
  # instead of building them from source each run.
  VCPKG_BINARY_SOURCES: "clear;http,https://vcpkg-cache.duckdb.org,read"

jobs:
  databricks-tests-linux:
    name: Databricks test (Linux)
    runs-on: ubuntu-latest
    env:
      VCPKG_TARGET_TRIPLET: x64-linux
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      USE_MERGED_VCPKG_MANIFEST: 1
      GEN: ninja
      DUCKDB_PLATFORM: linux_amd64
      BUILD_EXTENSION_TEST_DEPS: full
      DATABRICKS_WRITE_TEST_CATALOG: duckdb_write_testing
      RUN_WRITE_TESTS: 1
      # sccache caches BOTH C++ (duckdb auto-detects it, CMakeLists.txt NAMES ccache sccache)
      # and Rust (delta-kernel via RUSTC_WRAPPER); GHA backend is shared across jobs & runs.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0" # sccache cannot cache incremental compilation

    steps:
      - name: Install required ubuntu packages
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq software-properties-common
          sudo add-apt-repository ppa:git-core/ppa
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build make gcc-multilib g++-multilib zip unzip build-essential checkinstall curl libz-dev openssh-client

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Configure OpenSSL for Rust
        run: |
          cat >> "$GITHUB_ENV" <<EOF
          OPENSSL_ROOT_DIR="$PWD/build/release/vcpkg_installed/x64-linux"
          OPENSSL_DIR="$PWD/build/release/vcpkg_installed/x64-linux"
          OPENSSL_USE_STATIC_LIBS=true
          EOF

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: databricks/setup-cli@main

      - name: Setup credentials
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DATABRICKS_TOKEN: "op://testing-rw/databricks_ccv2/token"
          DATABRICKS_ENDPOINT: "op://testing-rw/databricks_ccv2/endpoint"
          DATABRICKS_REGION: "op://testing-rw/databricks_ccv2/aws_region"

      - name: Create Databricks config
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_ENDPOINT" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
          head -2 ~/.databrickscfg

      - name: Generate random schema name
        run: |
          echo "DATABRICKS_WRITE_TEST_SCHEMA=test_schema_$(uuidgen | tr '[:upper:]' '[:lower:]' | tr '-' '_')" >> "$GITHUB_ENV"

      - name: Prepare write tests
        run: |
          make write_tests_prepare

      # Cache the vcpkg-built packages (OpenSSL etc.). Correctness is guaranteed by
      # vcpkg manifest-mode reconciliation at configure time regardless of the key; the
      # key just governs freshness. It rotates on anything that changes the dep set:
      # vcpkg baseline, the pinned duckdb submodule (httpfs -> openssl), and the delta
      # pin / baseline in extension_config.cmake + vcpkg.json. Same key as LocalTesting
      # (identical triplet + extension set) so the two jobs share one cache.
      - name: Resolve duckdb revision for cache key
        id: duckdb_rev
        run: echo "sha=$(git rev-parse HEAD:duckdb)" >> "$GITHUB_OUTPUT"

      - name: Cache vcpkg built packages
        uses: actions/cache@v4
        with:
          path: build/release/vcpkg_installed
          key: vcpkg-x64-linux-${{ env.VCPKG_COMMIT_ID }}-${{ steps.duckdb_rev.outputs.sha }}-${{ hashFiles('vcpkg.json', 'extension_config.cmake') }}
          restore-keys: |
            vcpkg-x64-linux-${{ env.VCPKG_COMMIT_ID }}-
            vcpkg-x64-linux-

      - name: Build extension
        run: |
          make release
          sccache --show-stats || true

      - name: Run tests
        run: |
          make write_tests_run

      - name: Clean up test data
        if: always()
        run: |
          make write_tests_cleanup
