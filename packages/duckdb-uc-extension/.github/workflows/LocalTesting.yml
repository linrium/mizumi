name: Local functional tests
on:
  push:
    branches: [main, "v[12].[0-9]+-[a-zA-Z]*", "features/**"]
  pull_request:
  workflow_dispatch: # manual "Run workflow" for any branch (requires write access)
  repository_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
env:
  BASE_BRANCH: ${{ github.base_ref || (startsWith(github.ref, 'refs/heads/features/') && 'feature' || 'main') }}
  VCPKG_COMMIT_ID: 84bab45d415d22042bd0b9081aea57f362da3f35
  # Pull prebuilt vcpkg packages (OpenSSL etc.) from duckdb's hosted read-only cache
  # instead of building them from source each run.
  VCPKG_BINARY_SOURCES: "clear;http,https://vcpkg-cache.duckdb.org,read"

jobs:
  unity-catalog-local-linux:
    name: Local OSS Unity Catalog tests (Linux)
    runs-on: ubuntu-latest
    env:
      VCPKG_TARGET_TRIPLET: x64-linux
      GEN: ninja
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      USE_MERGED_VCPKG_MANIFEST: 1
      UC_TEST_SERVER_RUNNING: 1
      UC_TEST_DATA: "${{ github.workspace }}/unitycatalog/etc/data"
      BUILD_EXTENSION_TEST_DEPS: full
      # sccache caches BOTH C++ (duckdb auto-detects it, CMakeLists.txt NAMES ccache sccache)
      # and Rust (delta-kernel via RUSTC_WRAPPER); GHA backend is shared across jobs & runs.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0" # sccache cannot cache incremental compilation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Configure OpenSSL for Rust
        run: |
          cat >> "$GITHUB_ENV" <<EOF
          OPENSSL_ROOT_DIR="$PWD/build/release/vcpkg_installed/x64-linux"
          OPENSSL_DIR="$PWD/build/release/vcpkg_installed/x64-linux"
          OPENSSL_USE_STATIC_LIBS=true
          EOF

      - name: Install Ninja
        shell: bash
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - uses: actions/setup-node@v4

      - uses: actions/checkout@v4
        with:
          repository: unitycatalog/unitycatalog
          ref: v0.5.0
          path: unitycatalog

      - name: Setup Unity Catalog test server
        run: |
          sudo apt install openjdk-17-jre-headless
          cd unitycatalog
          build/sbt package
          bin/start-uc-server | tee uc.log &
          sleep 15 # should be quite fast, capture initial output in GH logs
          # some tests require manual inspection of files whose location incorrectly recorded; fake it
          env -C /tmp ln -sf "$PWD/etc/data/external/unity/default/tables/marksheet_uniform"

      - name: Build extension
        run: |
          make release
          sccache --show-stats || true

      # Seed the `duck` test catalog; requires duckdb CLI from release build above
      - name: Seed duck test catalog
        run: |
          UC_REPO="$GITHUB_WORKSPACE/unitycatalog" scripts/oss_uc_local/seed_tables

      - name: Test extension
        run: |
          # confirm UC test server up
          cat unitycatalog/uc.log
          unitycatalog/bin/uc catalog list
          make test_release

      - name: Move ssl certificate to ensure we still find it
        run: |
          sudo mv /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem

      - name: Test extension
        run: |
          make test_release
